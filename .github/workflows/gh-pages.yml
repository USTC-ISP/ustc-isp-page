name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches:
      - main  # 源码推到 main 分支时触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build
        run: hugo --minify

      - name: Deploy to destination repo
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.ACTIONS_DEPLOY_KEY }} # 需要您在源码仓库配置 Deploy Key
          external_repository: USTC-ISP/ustc-isp.github.io
          publish_branch: main # 产物推到目标仓库的 main 分支
          publish_dir: ./public
